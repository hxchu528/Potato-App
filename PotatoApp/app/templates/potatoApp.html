<!DOCTYPE html>
<html>
<style>
body{
	height:100%;
	margin:0px;
}
nav, footer{
	background-color:#69131D;
	height:5vh;
}
#hold{
	background-color:white;
	height:90vh;
	overflow:auto;
}
h1{
	background-color:white;
	margin-top:0px;
	margin-bottom:0px;
	padding:5px;
	text-align:center;
}
#form{
	background-color:white;
	padding: 5px;
	display:table;
	align-items: center;
	margin-left:auto;
	margin-right:auto;
}
#form div{
	display:table-row;
}
#form label{
	text-align:right;
	padding-right:10px;
	display:table-cell;
}
#form input, p, button, select{
	margin-top:3px;
	display:table-cell;
}
#form p{
	text-align:center;
}
#form button{
	align-items:center;
}
#output{
	width:90%;
	height:30%;
	margin-left:auto;
	margin-right:auto;
	background-color:white;
	border:1px solid;
	margin-top:0px;
	overflow-y:auto;
	padding: 5px;
	text-align:center;
}
</style>
<body>
	<nav></nav>
	<div id = "hold">
		<h1>Potato App</h1>
		<form id = "form" enctype="multipart/form-data" method="POST">
			{% csrf_token %}
			<div>
				<label for = "weather">Weather file (Excel/CSV):</label>
				<input required type = "file" class = "upload" name = "weather" value="{{form.weather.value|default_if_none:''}}">
			</div>
			<div>
				<label for = "planting_date">Planting Date:</label>
				<input required type = "date" name = "planting_date" value="{{form.planting_date.value|default_if_none:''}}">
			</div>
			<div>
				<label for = "spad_date">SPAD Acquisition date:</label>
				<input required type = "date" name = "spad_date" value="{{form.spad_date.value|default_if_none:''}}">
			</div>
			<div>
				<label for = "cultivar">Cultivar:</label>
				<select required name = "cultivar" value="{{ form.cultivar.value|default_if_none:'' }}">
					<option value = "">--Select--</option>
					<option value = "Alpine Russet">Alpine Russet</option>
					<option value = "Clearwater">Clearwater</option>
					<option value = "Dakota Russet">Dakota Russet</option>
					<option value = "Easton">Easton</option>
					<option value = "FL 1867">FL 1867</option>
					<option value = "FL 2137">FL 2137</option>
					<option value = "Hamlin">Hamlin</option>
					<option value = "Ivory Russet">Ivory Russet</option>
					<option value = "Lamoka">Lamoka</option>
					<option value = "MN13142">MN13142</option>
					<option value = "MN13142Cold">MN13142Cold</option>
					<option value = "Red Norland">Red Norland</option>
					<option value = "Russet Burbank">Russet Burbank</option>
					<option value = "Umatilla">Umatilla</option>
				</select>
			</div>
			<div>
				<label for = "spad_value">SPAD Value:</label>
				<input required type = "number" name = "spad_value" value="{{ form.spad_value.value|default_if_none:'' }}" placeholder="0.0"></input>
			</div>
			<div>
				<label for = "irrigation">Irrigation level (inch):</label>
				<input type = "number" name = "irrigation" value="{{ form.irrigation.value|default_if_none:'' }}" placeholder="0"></input>
			</div>
			<div>
				<p></p>
				<button type="submit">Enter</button>
			</div>
		</form>
		<div id = "output">Output:<br>{{ message }}</div>
	</div>
	<footer></footer>
</body>

</html>
